spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scheduler_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:scheduler_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:scheduler_password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.demo-data.enabled=${APP_DEMO_DATA_ENABLED:true}
