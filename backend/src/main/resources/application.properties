spring.application.name=course-work-scheduler-api
spring.profiles.default=local

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true

info.app.name=Course + Work Schedule Optimizer API
info.app.description=Backend API for schedule generation and saved schedule comparison
info.app.version=0.0.1
info.app.java.version=${java.version}
info.app.repository=https://github.com/Tculhane8879/course-work-scheduler

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.demo-data.enabled=${APP_DEMO_DATA_ENABLED:false}
