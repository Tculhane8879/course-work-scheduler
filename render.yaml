services:
  - type: web
    name: course-work-scheduler-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "10000"
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: validate
      - key: SPRING_FLYWAY_BASELINE_ON_MIGRATE
        value: "false"
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: APP_DEMO_DATA_ENABLED
        value: "true"
      - key: SPRINGDOC_API_DOCS_ENABLED
        value: "true"
      - key: SPRINGDOC_SWAGGER_UI_ENABLED
        value: "true"
